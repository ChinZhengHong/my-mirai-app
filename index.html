<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <title>My App</title>
    </head>

     <body>

        <h1>Magical Mirai 2026</h1>

        <button id="play">Play</button>

        <audio id="audio" controls></audio>

        <script src="https://unpkg.com/axios/dist/axios.min.js"></script>
        <script src="https://unpkg.com/textalive-app-api/dist/index.js"></script>
        <script>
            const { Player } = TextAliveApp;

            const player = new Player({
                app: {
                    token: "TFDPmHRDYBEDf2cg",
                },
                mediaElement: document.getElementById("audio"),
            });

            
            player.addListener({
                onAppReady: () => {
                    console.log("App is ready");
                    player.createFromSongUrl("https://piapro.jp/t/hZ35/20240130103028");
                },

               onVideoReady: () =>{
                console.log("Video is ready");

                
               },

               onTimeUpdate(position) {
                console.log("time:",position);

                if (player.video) {
                    const phrase = player.video.findPhrase(position);
                    if (phrase) {
                        document.getElementById("lyrics").textContent = phrase.text;
                    } else {
                        document.getElementById("lyrics").textContent = "";
                }
               }
            },
            });

            document.getElementById("play").addEventListener("click", () => {
                console.log("Play button clicked");

            const audio = document.getElementById("audio");
                audio.currentTime = 0;
                audio.muted = false;
                
            });
        </script>
        <div id ="lyrics">Loading...</div>
     </body>
</html>
