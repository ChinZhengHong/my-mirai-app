<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <title>My App</title>
        <link rel="stylesheet" href="style.css">
    </head>

     <body>

        <h1>Magical Mirai 2026</h1>

        <button id="play">Play</button>

        <div id ="lyrics"></div>
                <script src="https://unpkg.com/axios/dist/axios.min.js"></script>
        <script src="https://unpkg.com/textalive-app-api/dist/index.js"></script>
        <script>
            const { Player } = TextAliveApp;

            const player = new Player({
                app: {
                    token: "TFDPmHRDYBEDf2cg",
                },
                
            });

            let currentText = "";
            let currentChar = null;
            
            player.addListener({
                onAppReady: () => {
                    console.log("App is ready");
                    player.createFromSongUrl("https://piapro.jp/t/E2i3/20251215092113");
                },

                onVideoReady: () => {
                    console.log("Video is ready");
                },

                onTimeUpdate(position) {
                    if (!player.video) return;

                    const char = player.video.findChar(position);
                    if (!char) return;

                    const container = document.getElementById("lyrics");

                    if (!currentChar || char.parent !== currentChar.parent) {
                        const line = document.createElement("div");
                        line.className = "line";

                        line.textContent = char.parent.text;

                        container.appendChild(line);

                        const maxLines = 6;
                        if (container.children.length > maxLines) {
                            container.removeChild(container.firstChild);
                        }

                        container.scrollTop = container.scrollHeight;
                    }

                    currentChar = char;
                }                
            });
            

            document.getElementById("play").addEventListener("click", () => {
            console.log("Play button clicked");
            
            player.requestPlay();
                
            });
        </script>

     </body>
</html>
