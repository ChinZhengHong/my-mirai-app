<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <title>My App</title>
    </head>

     <body>

        <h1>Magical Mirai 2026</h1>

        <script src="https://unpkg.com/axios/dist/axios.min.js"></script>
        <script src="https://unpkg.com/textalive-app-api/dist/index.js"></script>
        <script>
            const { Player } = TextAliveApp;

            const player = new Player({
                app: {
                    token: "TFDPmHRDYBEDf2cg",
                },
                mediaElement: document.createElement("audio")
            });

            
            player.addListener({
                onAppReady: (app) => {
                    
                if (app.songUrl) 
                {
                    console.log("Song from Debugger:", app.songUrl);
                    } 
                    else 
                    {
                    // fallback
                    player.createFromSongUrl("https://www.youtube.com/watch?v=RYv4-QCJk4s");
                    }

                    }
            
            });
        </script>
     </body>
</html>
