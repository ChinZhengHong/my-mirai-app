<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <title>My App</title>
        <link rel="stylesheet" href="style.css">
    </head>

     <body>

        <h1>Magical Mirai 2026</h1>

        <button id="play">Play</button>

        <div id ="lyrics">Loading...</div>
                <script src="https://unpkg.com/axios/dist/axios.min.js"></script>
        <script src="https://unpkg.com/textalive-app-api/dist/index.js"></script>
        <script>
            const { Player } = TextAliveApp;

            const player = new Player({
                app: {
                    token: "TFDPmHRDYBEDf2cg",
                },
                
            });

            let currentText = "";
            let currentChar = null;
            
            player.addListener({
                onAppReady: () => {
                    console.log("App is ready");
                    player.createFromSongUrl("https://piapro.jp/t/E2i3/20251215092113");
                },

               onVideoReady: () =>{
                console.log("Video is ready");
                },

               onTimeUpdate(position) {
                console.log("time:",position);

                if (!player.video) return;

                const char = player.video.findChar(position);

                
                if (char && char !== currentChar) {
                    currentChar = char;
                    const phrase = char.parent;
                    
                    let text = "";
                    let c = phrase.children[0];
                    while (c) {
                        text += c.text;
                        if (c === char) break;
                        c = c.next;
                    }

                    currentText = text;
                    document.getElementById("lyrics").innerHTML = `<span class = "pop">${currentText}</span>`;
                }
            }
            
            });

            document.getElementById("play").addEventListener("click", () => {
            console.log("Play button clicked");
            
            
            player.requestMediaSeek(0); // Start from the beginning
            player.requestPlay();
                
            });
        </script>

     </body>
</html>
